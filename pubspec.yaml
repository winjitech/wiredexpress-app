name: wired_express
description: "A new Flutter project."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter


  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.6

  sensors_plus: ^3.0.3
  firebase_core: ^3.6.0
  hive_flutter: ^1.1.0
  hive: ^2.2.1
  get_it: ^7.2.0
  shimmer_animation: ^2.1.0+1
  dio: ^5.7.0
  shared_preferences: ^2.0.15
  provider: ^6.0.3
  firebase_messaging: ^15.1.3
  geolocator: ^14.0.0
  intl: ^0.19.0
  image: ^4.0.15
  carousel_slider: ^5.0.0
  cached_network_image: ^3.2.0
  font_awesome_flutter: ^10.4.0
  image_picker: ^0.8.7+2
  permission_handler: ^12.0.0+1
  url_launcher: ^6.1.10
  http: ^1.0.0
  google_sign_in: ^6.1.4
  firebase_auth: ^5.3.1
  timeago: ^3.4.0
  pin_code_fields: ^8.0.1
  photo_view: ^0.14.0
  numberpicker: ^2.1.1
  google_maps_flutter: ^2.9.0
  geocoding: ^2.1.0
  country_code_picker: ^3.0.0
  flutter_cache_manager: ^3.3.1
  loading_animation_widget: ^1.2.0+4
  flutter_html: ^3.0.0-alpha.3
  webview_flutter: ^4.0.7
  widget_to_marker: ^1.0.4
  flutter_secure_storage: ^9.0.0
#  win32: ^5.5.4
  google_places_flutter: ^2.0.9
  flutter_local_notifications: ^18.0.1
  http_parser: ^4.0.0
  drop_down_search_field: ^1.0.0
  connectivity_plus: ^5.0.2
  fluro: ^2.0.5
  pinput: ^4.0.0
  flutter_localization: ^0.2.2
  hidden_drawer_menu: ^3.0.1
  flutter_advanced_drawer: ^1.3.6
  pointer_interceptor: ^0.10.1+2
  loop_page_view: ^1.2.5
  flutter_polyline_points: ^2.1.0
  package_info_plus: ^8.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  # The "flutter_lints" package below contains a set of recommended lints to
